<!DOCTYPE html>
<html>
<head>
  <title>Admin Antrian</title>
  <style>
    body {
      text-align: center;
      background: black;
      color: white;
      font-family: Arial;
    }

    .big {
      font-size: 80px;
      color: lime;
    }

    h2 { color: yellow; }
    h3 { color: cyan; }

    button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    #list {
      margin-top: 20px;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .item {
      padding: 10px;
      border-bottom: 1px solid #444;
    }
  </style>
</head>
<body>

<h1>ADMIN ANTRIAN</h1>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <div class="big" id="current">A000</div>

  <h2 id="nama">-</h2>
  <h3 id="hp">-</h3>

  <h3>Sisa Antrian: <span id="sisa">0</span></h3>

  <button onclick="next()">Panggil</button>
  <button onclick="ulang()">Panggil Ulang</button>
  <button onclick="reset()">Reset</button>

  <h2>Daftar Antrian</h2>
  <div id="list">Loading...</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDiBMFzSL0AvP_DGuqFmdN-Oh3mrhJEnBw",
  authDomain: "antrian-app-aa93c.firebaseapp.com",
  databaseURL: "https://antrian-app-aa93c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-app-aa93c"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();


// 🔐 LOGIN
function login() {
  let pass = document.getElementById("pass").value;
  if (pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Password salah!");
  }
}


// 🎫 FORMAT NOMOR
function formatNomor(n) {
  return "A" + String(n).padStart(3, '0');
}


// 🔊 SUARA
function suara(nomor) {
  let teks = "Nomor antrian " + nomor + " silakan maju";
  let u = new SpeechSynthesisUtterance(teks);
  u.lang = "id-ID";
  speechSynthesis.speak(u);
}


// 🔄 UPDATE NOMOR + USER
db.ref("antrian").on("value", function(snap) {
  let data = snap.val() || {};
  let current = data.current || 0;
  let nomor = data.nomor || 0;

  document.getElementById("current").innerText = formatNomor(current);

  // sisa antrian
  let sisa = nomor - current;
  if (sisa < 0) sisa = 0;
  document.getElementById("sisa").innerText = sisa;

  // ambil user sekarang
  db.ref("antrian/list/" + current).once("value", function(d) {
    let user = d.val();

    if (user) {
      document.getElementById("nama").innerText = "Nama: " + user.nama;
      document.getElementById("hp").innerText = "HP: " + user.hp;
    } else {
      document.getElementById("nama").innerText = "-";
      document.getElementById("hp").innerText = "-";
    }
  });
});


// 🔥 LIST SEMUA PENDAFTAR (FIX)
db.ref("antrian/list").on("value", function(snap) {
  let list = snap.val();

  if (!list) {
    document.getElementById("list").innerHTML = "Belum ada antrian";
    return;
  }

  let html = "";

  Object.keys(list).forEach(function(key) {
    let user = list[key];

    html += `
      <div class="item">
        <b>${formatNomor(key)}</b> - ${user.nama} (${user.hp})
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
});


// ▶️ NEXT
function next() {
  db.ref("antrian").once("value", function(snap) {
    let d = snap.val() || {};
    let current = d.current || 0;
    let nomor = d.nomor || 0;

    if (current < nomor) {
      current++;
      db.ref("antrian").update({ current: current });

      let formatted = formatNomor(current);

      suara(formatted);
      setTimeout(() => suara(formatted), 3000);

    } else {
      alert("Antrian habis!");
    }
  });
}


// 🔁 PANGGIL ULANG
function ulang() {
  db.ref("antrian/current").once("value", function(snap) {
    let current = snap.val() || 0;

    if (current > 0) {
      let formatted = formatNomor(current);

      suara(formatted);
      setTimeout(() => suara(formatted), 3000);

    } else {
      alert("Belum ada antrian!");
    }
  });
}


// 🔄 RESET
function reset() {
  db.ref("antrian").set({
    nomor: 0,
    current: 0
  });
  alert("Antrian direset!");
}
</script>

</body>
</html>
