<!DOCTYPE html>
<html>
<head>
  <title>Admin Antrian</title>
  <style>
    body {
      text-align: center;
      background: black;
      color: white;
      font-family: Arial;
    }
    .big {
      font-size: 80px;
      color: lime;
    }
    h2 {
      color: yellow;
    }
    h3 {
      color: cyan;
    }
    button {
      font-size: 25px;
      padding: 15px 30px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>ADMIN ANTRIAN</h1>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">
  <div class="big" id="current">A000</div>

  <h2 id="nama">-</h2>
  <h3 id="hp">-</h3>

  <button onclick="next()">Panggil</button>
  <button onclick="reset()">Reset</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDiBMFzSL0AvP_DGuqFmdN-Oh3mrhJEnBw",
  authDomain: "antrian-app-aa93c.firebaseapp.com",
  databaseURL: "https://antrian-app-aa93c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "antrian-app-aa93c"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 🔐 LOGIN
function login() {
  let pass = document.getElementById("pass").value;
  if (pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Password salah!");
  }
}

// 🎫 FORMAT NOMOR
function formatNomor(n) {
  return "A" + String(n).padStart(3, '0');
}

// 🔊 SUARA
function suara(nomor) {
  let teks = "Nomor antrian " + nomor + " silakan maju";
  let u = new SpeechSynthesisUtterance(teks);
  u.lang = "id-ID";
  speechSynthesis.speak(u);
}

// 🔄 UPDATE CURRENT + DATA USER
db.ref("antrian/current").on("value", function(snap) {
  let val = snap.val() || 0;

  document.getElementById("current").innerText = formatNomor(val);

  // ambil data user
  db.ref("antrian/list/" + val).once("value", function(data) {
    let user = data.val();

    if (user) {
      document.getElementById("nama").innerText = "Nama: " + user.nama;
      document.getElementById("hp").innerText = "HP: " + user.hp;
    } else {
      document.getElementById("nama").innerText = "-";
      document.getElementById("hp").innerText = "-";
    }
  });
});

// ▶️ NEXT
function next() {
  db.ref("antrian").once("value", function(snap) {
    let d = snap.val() || {};
    let current = d.current || 0;
    let nomor = d.nomor || 0;

    if (current < nomor) {
      current++;
      db.ref("antrian").update({ current: current });

      let formatted = formatNomor(current);
      suara(formatted);
    } else {
      alert("Antrian habis!");
    }
  });
}

// 🔄 RESET
function reset() {
  db.ref("antrian").set({
    nomor: 0,
    current: 0
  });
  alert("Antrian direset!");
}
</script>

</body>
</html>
